; ============================================================
;  platformio.ini  –  HELIOS Solar Yield Maximizer
;  PlatformIO Project Configuration
; ============================================================

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino

; Serial monitor baud rate (must match Serial.begin() in main.cpp)
monitor_speed = 115200

; Upload speed (reduce to 460800 if you encounter upload errors)
upload_speed  = 921600

; Required Libraries
lib_deps =
    madhephaestus/ESP32Servo @ ^0.13.0
    adafruit/Adafruit INA219 @ ^1.2.3
    adafruit/Adafruit BusIO @ ^1.16.1

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_ARCH_ESP32

; Optional: set to your COM port if auto-detect fails
; upload_port = COM3       ; Windows
; upload_port = /dev/ttyUSB0  ; Linux
; upload_port = /dev/cu.SLAB_USBtoUART  ; macOS
